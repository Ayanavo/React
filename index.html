<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Epsilon</title>
    <link rel="firebase icon" href="src/assets/favicon.svg" type="image/svg+xml" />
    <style>
      .loader-screen {
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(0, 0, 0, 0.3);
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .loader {
        width: 48px;
        height: 48px;
        margin: auto;
        position: relative;
      }
      .loader:before {
        content: "";
        width: 48px;
        height: 5px;
        background: #000;
        opacity: 0.25;
        position: absolute;
        top: 60px;
        left: 0;
        border-radius: 50%;
        animation: shadow 0.5s linear infinite;
      }
      .loader:after {
        content: "";
        width: 100%;
        height: 100%;
        background: #fff;
        animation: bxSpin 0.5s linear infinite;
        position: absolute;
        top: 0;
        left: 0;
        border-radius: 4px;
      }
      @keyframes bxSpin {
        17% {
          border-bottom-right-radius: 3px;
        }
        25% {
          transform: translateY(9px) rotate(22.5deg);
        }
        50% {
          transform: translateY(18px) scale(1, 0.9) rotate(45deg);
          border-bottom-right-radius: 40px;
        }
        75% {
          transform: translateY(9px) rotate(67.5deg);
        }
        100% {
          transform: translateY(0) rotate(90deg);
        }
      }

      @keyframes shadow {
        0%,
        100% {
          transform: scale(1, 1);
        }
        50% {
          transform: scale(1.2, 1);
        }
      }
    </style>
  </head>
  <body style="pointer-events: auto">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div class="loader-screen"><span class="loader"></span></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
